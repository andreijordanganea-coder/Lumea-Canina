<main>
    <h1>Dresajul câinilor
        </h1>

    <div class="info-card" style="max-width: 600px;">
        <div class="info-text">
            <h2>Ai întrebări despre prietenul tău patruped?</h2>

            
            <form action="#" method="post" class="contact-form">
                <div class="form-group">
                    <label for="nume">Nume Complet:</label>
                    <input type="text" id="nume" name="nume" placeholder="Ex: Ion Popescu" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Adresa de Email:</label>
                    <input type="email" id="email" name="email" placeholder="nume@exemplu.com" required>
                </div>
                
                <div class="form-group">
                    <label for="subiect">Subiect:</label>
                    <select id="subiect" name="subiect">
                        <option value="dresaj">Întrebare Dresaj</option>
                        <option value="nutritie">Sfaturi Nutriție</option>
                        <option value="adoptie">Informații Adopție</option>
                        <option value="altele">Altele</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="mesaj">Mesajul tău:</label>
                    <textarea id="mesaj" name="mesaj" rows="5" placeholder="Scrie aici mesajul tău..." required></textarea>
                </div>
                
                <button type="submit" class="btn-submit">Trimite Mesajul</button>
            </form>

            <div>
                Telefon: 123456789
            </div>
        </div>
            
        </div>
        
        
    </main>

</body>

</html>
